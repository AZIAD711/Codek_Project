<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="create account for student">
    <meta name="keywords" content="Codek sign up">
    <meta name="author" content="Zeyad Ahmed Hussin">
    <link rel="shortcut icon" href="../assets/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/index.css">
    <title>Sign up ( Teacher ) | Codek</title>
</head>

<body>
    <form action="">
        <!-- TITLE OF FORM  -->
        <section class="title-form">
            <img src="../assets/images/logo.png" alt="logo" loading="lazy">
            <h1>Create Account</h1>
            <p>for teacher account</p>
        </section>
        <!-- INPUTS GROUP -->
        <section class="inputs-group">
            <!-- EMAIL -->
            <section class="email-input">
                <input type="email" name="email" id="email" placeholder="Email Address">
                <img src="../assets/icons/email-svgrepo-com (4) 1.png" alt="email icon" loading="lazy">
            </section>
            <!-- PASSWORD -->
            <section class="password-input">
                <input type="password" name="password" id="password" placeholder="Password">
                <img src="../assets/icons/password-svgrepo-com (2) 1.png" alt="password icon" loading="lazy">
            </section>
            <!-- FULL NAME -->
            <section class="full-name-input">
                <input type="text" name="name" id="name" placeholder="Full Name">
                <img src="../assets/icons/user-svgrepo-com (4) 1.png" alt="name icon" loading="lazy">
            </section>
            <!-- PHONE NUMBER -->
            <section class="phone-number-input">
                <input type="tel" name="tel-phone" id="tel-phone" placeholder="Phone Number">
                <img src="../assets/icons/phone-svgrepo-com (2) 1.png" alt="tel-phone icon" loading="lazy">
            </section>
            <!-- SPECIALIST TYPE -->
            <section class="specialist-type-input">
                <label for="specialist-type">Specialist Type : </label>
                <section class="languages-options">
                    <label>
                        <input type="checkbox" name="specialist-type" value="HTML">
                        HTML
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="CSS">
                        CSS
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="JAVASCRIPT">
                        JAVASCRIPT
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="PHP">
                        PHP
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="PYTHON">
                        PYTHON
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="C++">
                        C++
                    </label>

                    <label>
                        <input type="checkbox" name="specialist-type" value="JAVA">
                        JAVA
                    </label>
                    <label>
                        <input type="checkbox" name="specialist-type" value="MYSQL">
                        MYSQL
                    </label>
                </section>
            </section>
        </section>
        <!-- SUBMIT BUTTON  -->
        <button type="submit">Submit</button>
        <!-- LOGIM LINK -->
        <section class="login-link">
            <p>You have already account ? <a href="#">Login</a></p>
        </section>
    </form>
</body>

</html>
